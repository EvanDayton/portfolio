<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>LANDING PAGE</title>
    <link rel="stylesheet" href="css/styles.css">

  </head>

  <body>
    <div id="scene-container"></div>
    <img src="img/curse.png" alt="Logo" class="logo">
    <img src="img/title.png" alt="Title" class="title">
    <canvas id="hyperspaceCanvas" style="display: none;"></canvas>
    <div class="loading-pulse"></div>
    
    <!-- Vignette effect -->
    <div id="vignette" class="vignette"></div>
    
    <!-- Scroll indicator -->
    <div id="scroll-indicator" class="scroll-indicator">
      <div class="scroll-arrow">▼</div>
      <div class="scroll-text">scroll</div>
    </div>
    
    <!-- Press to enter indicator -->
    <div id="press-enter" class="press-enter">
      <div class="press-text">press to enter</div>
      <div class="press-arrow">▼</div>
    </div>
    
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/hyperspace.js"></script>
  </body>

</html>
